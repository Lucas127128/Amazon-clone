name: ci
on: [push]
jobs:
  test:
    name: test app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache
        uses: actions/cache@v4
        with:
          key: the-key
          path: |
            ./node_modules
            **/*/node_modules
            ./packages/server/certs
      - name: Install bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependency
        run: bun i

      - name: Build app
        run: bun run build
      - name: Install dependency for https
        run: |
          curl -JLO "https://dl.filippo.io/mkcert/latest?for=linux/amd64"
          chmod +x mkcert-v*-linux-amd64
          sudo cp mkcert-v*-linux-amd64 /usr/local/bin/mkcert
      - name: Run Bun Server
        uses: JarvusInnovations/background-action@v1
        with:
          run: FORCE_COLOR=1 bun run --cwd ./packages/server dev
          wait-on: https://localhost:8080
      - name: Run tests
        run: FORCE_COLOR=1 bun run --cwd ./packages/tests test:ci
